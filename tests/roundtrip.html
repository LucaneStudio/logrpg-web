<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Test aller-retour markdown ↔ DOM éditable — éditeur rich</title>
  <style>
    body { font-family: ui-monospace, Menlo, Consolas, monospace; background:#0f1419; color:#d6dde6;
           margin:0; padding:24px; line-height:1.5; }
    h1 { font-size:16px; color:#fff; margin:0 0 4px; }
    .sub { color:#7b8794; font-size:12px; margin-bottom:18px; }
    #summary { font-size:14px; font-weight:700; padding:10px 14px; border-radius:8px; margin-bottom:16px; }
    .ok  { background:#15351f; color:#7ee2a8; }
    .ko  { background:#3a1620; color:#ff8aa3; }
    table { border-collapse:collapse; width:100%; font-size:12px; }
    th, td { border:1px solid #243040; padding:6px 9px; text-align:left; vertical-align:top; }
    th { background:#161d27; color:#9fb0c2; position:sticky; top:0; }
    td.pass { color:#7ee2a8; font-weight:700; white-space:nowrap; }
    td.fail { color:#ff8aa3; font-weight:700; white-space:nowrap; }
    pre { margin:0; white-space:pre-wrap; word-break:break-word; }
    .lbl { color:#7b8794; }
    .hidden-sink { position:absolute; left:-9999px; top:-9999px; }
  </style>
</head>
<body>
  <h1>Aller-retour <code>markdown → DOM éditable → markdown</code></h1>
  <div class="sub">Idempotence du couple miroir (spec §13.1). Le DOM est construit pour de vrai
    via <code>mjMdToEditableHtml</code>, puis relu via <code>mjEditableToMd</code>.</div>
  <div id="summary">Exécution…</div>
  <table id="results">
    <thead><tr><th>Cas</th><th>Entrée (markdown)</th><th>Sortie (re-sérialisée)</th><th>Résultat</th></tr></thead>
    <tbody></tbody>
  </table>
  <div id="sink" class="hidden-sink" contenteditable="true"></div>

  <!-- Dépendances minimales : escapeHtml + inlineMd, puis le moteur rich -->
  <script src="../js/db.js"></script>
  <script src="../js/player/notes.js"></script>
  <script src="../js/mj/rich.js"></script>
  <script>
    // _mjTagFind n'est pas chargé ici → les @tags donnent des puces « cassées »
    // mais qui round-trippent (data-name conservé). C'est exactement ce qu'on teste.
    const CASES = [
      ['texte simple',            'Bonjour le monde'],
      ['gras',                    'Un mot **important** ici'],
      ['italique',                'Un mot *penché* ici'],
      ['souligné',                'Un mot __souligné__ ici'],
      ['barré',                   'Un mot ~~barré~~ ici'],
      ['gras+ital imbriqués',     'Très **gras et *penché* dedans** voilà'],
      ['gras+souligné',           'Texte **__cumulé__** stop'],
      ['marques multiples',       '**A** puis *B* puis __C__ puis ~~D~~'],
      ['tag simple',              'Parler à @Gandalf maintenant'],
      ['tag accolades',          'Aller au @{Mont du Destin} vite'],
      ['tag dans gras',           'Le **@Gandalf** parle'],
      ['widget switch',           'Porte /switch{Ouverte} fermée'],
      ['widget switch on',        'Trouvé /switch[x]{Objet} oui'],
      ['widget combo',            'État /combo[1]{Porte: fermée|ouverte} ici'],
      ['widget compteur',         'Vie /compteur[3]{pv: 0..10} restante'],
      ['widget jauge',            'Rituel /jauge[2]{Invocation: 6} avance'],
      ['retour ligne',            'Ligne un\nLigne deux'],
      ['mélange complet',         'Le **héros** voit @Gandalf et /switch[x]{piège} puis\nrepart *vite*'],
      ['vide',                    ''],
      ['tag + widget côte à côte', '@Bob /todo{tâche} fin'],
    ];

    const sink = document.getElementById('sink');
    const tbody = document.querySelector('#results tbody');
    let passed = 0;

    CASES.forEach(([name, md]) => {
      sink.innerHTML = mjMdToEditableHtml(md);
      const back = mjEditableToMd(sink);
      const ok = back === md;
      if (ok) passed++;
      const tr = document.createElement('tr');
      tr.innerHTML =
        `<td>${escapeHtml(name)}</td>` +
        `<td><pre>${escapeHtml(JSON.stringify(md))}</pre></td>` +
        `<td><pre>${escapeHtml(JSON.stringify(back))}</pre></td>` +
        `<td class="${ok ? 'pass' : 'fail'}">${ok ? '✓ OK' : '✗ FAIL'}</td>`;
      tbody.appendChild(tr);
    });

    const summary = document.getElementById('summary');
    const all = CASES.length;
    summary.textContent = `${passed}/${all} cas réussis` + (passed === all ? ' — idempotence OK ✓' : ' — RÉGRESSIONS ✗');
    summary.className = passed === all ? 'ok' : 'ko';
    window.__ROUNDTRIP__ = { passed, all };
  </script>
</body>
</html>
